name: Canary Release

on:
  push:
    branches: [main, dev]

jobs:
  publish-canary:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'chore: publish')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: oven-sh/setup-bun@v2

      - name: Install & Build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Release Snapshot
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > .npmrc

          if [ -z "$(ls .changeset/*.md 2>/dev/null | grep -v README.md)" ]; then
            echo -e "---\n'@adn-ui/core': patch\n'@adn-ui/react': patch\n'@adn-ui/styles': patch\n---\nAutomated" > .changeset/force-snapshot.md
          fi

          SHA=$(git rev-parse --short HEAD)

          npx changeset version --snapshot canary

          npx changeset publish --tag canary
